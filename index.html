<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habits</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000;
    --text: #fff;
    --dim: #333;
    --accent: #fff;
  }
  html, body {
    background: #000;
    color: #fff;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100dvh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── HABIT SCREEN ── */
  #habitScreen {
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    align-items: center;
    justify-content: center;
  }

  .habit-list {
    width: 100%;
    padding: 0 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .habit-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid #111;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    animation: fadeIn .25s ease;
    transition: opacity .15s;
  }
  .habit-item:first-child { border-top: 1px solid #111; }
  .habit-item:active { opacity: .5; }

  .habit-check {
    width: 22px;
    height: 22px;
    border: 1.5px solid #444;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all .2s;
  }
  .habit-name {
    font-size: 19px;
    font-weight: 300;
    letter-spacing: -0.3px;
    color: #fff;
    flex: 1;
  }

  .no-habits {
    text-align: center;
    color: #333;
    font-size: 16px;
    font-weight: 300;
    padding: 60px 40px;
    line-height: 1.6;
  }

  .day-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 40px;
    text-align: center;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* long-press hint */
  .hint {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 12px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #222;
    white-space: nowrap;
  }

  /* ── SETTINGS SCREEN ── */
  #settingsScreen {
    padding: env(safe-area-inset-top, 20px) 28px env(safe-area-inset-bottom, 40px);
    overflow-y: auto;
  }

  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 36px;
  }
  .settings-title { font-size: 28px; font-weight: 200; letter-spacing: -1px; }
  .btn-close {
    background: none; border: none; color: #555; font-size: 22px; cursor: pointer;
    padding: 4px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 16px;
    margin-top: 32px;
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .day-tab {
    padding: 7px 14px;
    border: 1px solid #222;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 300;
    cursor: pointer;
    background: none;
    color: #666;
    transition: all .15s;
  }
  .day-tab.selected { border-color: #fff; color: #fff; background: #111; }

  .habit-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .habit-input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 14px 16px;
    color: #fff;
    font-size: 16px;
    font-weight: 300;
    outline: none;
    -webkit-appearance: none;
  }
  .habit-input:focus { border-color: #444; }
  .habit-input::placeholder { color: #333; }

  .btn-add {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    font-weight: 300;
  }

  .saved-habits {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .saved-habit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: #0a0a0a;
    border: 1px solid #111;
    border-radius: 8px;
  }
  .saved-habit-name { font-size: 15px; font-weight: 300; }
  .btn-delete {
    background: none; border: none; color: #333; font-size: 18px; cursor: pointer; padding: 4px 8px;
    transition: color .15s;
  }
  .btn-delete:active { color: #ff4444; }

  /* stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: #0a0a0a;
    border: 1px solid #111;
    border-radius: 10px;
    padding: 18px 16px;
  }
  .stat-val { font-size: 32px; font-weight: 200; letter-spacing: -2px; }
  .stat-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #444; margin-top: 4px; }

  .export-btn {
    width: 100%;
    margin-top: 12px;
    padding: 16px;
    background: none;
    border: 1px solid #222;
    border-radius: 8px;
    color: #888;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
  }
  .export-btn:active { border-color: #fff; color: #fff; }

  .streak-bar {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .streak-day {
    width: 10px; height: 10px;
    border-radius: 2px;
    background: #111;
  }
  .streak-day.done { background: #fff; }

  /* completion flash */
  .all-done-msg {
    text-align: center;
    color: #222;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 30px;
  }
</style>
</head>
<body>

<!-- MAIN HABIT SCREEN -->
<div id="habitScreen" class="screen active">
  <div class="day-label" id="dayLabel"></div>
  <div class="habit-list" id="habitList"></div>
  <div class="hint" id="hintText">hold for settings</div>
</div>

<!-- SETTINGS SCREEN -->
<div id="settingsScreen" class="screen">
  <div class="settings-header">
    <span class="settings-title">Habits</span>
    <button class="btn-close" onclick="closeSettings()">✕</button>
  </div>

  <div class="section-label">Add Habit</div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="habit-input-row">
    <input class="habit-input" id="newHabitInput" placeholder="Habit name…" maxlength="60">
    <button class="btn-add" onclick="addHabit()">+</button>
  </div>

  <div class="section-label">My Habits</div>
  <div class="saved-habits" id="savedHabitsList"></div>

  <div class="section-label">Statistics</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="streak-bar" id="streakBar"></div>

  <div class="section-label">Data</div>
  <button class="export-btn" onclick="exportCSV()">Export to CSV → Google Sheets</button>
  <button class="export-btn" style="margin-top:6px; color:#333; border-color:#111;" onclick="clearData()">Reset all data</button>
</div>

<script>
// ── DATA ──
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYSFULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// habits: { id, name, days: [0-6 array] }
let habits = load('habits', []);
// completions: { 'YYYY-MM-DD': [id, id, ...] }
let completions = load('completions', {});

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayDow() { return new Date().getDay(); }

// ── RENDER MAIN ──
function renderMain() {
  const dow = todayDow();
  const key = todayKey();
  const done = completions[key] || [];

  document.getElementById('dayLabel').textContent = DAYSFULL[dow];

  const todayHabits = habits.filter(h => h.days.includes(dow));
  const remaining = todayHabits.filter(h => !done.includes(h.id));

  const list = document.getElementById('habitList');
  list.innerHTML = '';

  if (todayHabits.length === 0) {
    list.innerHTML = `<div class="no-habits">No habits set for today.<br><br>Hold anywhere to add habits.</div>`;
    return;
  }

  if (remaining.length === 0) {
    list.innerHTML = `<div class="all-done-msg">All done</div>`;
    return;
  }

  remaining.forEach(h => {
    const div = document.createElement('div');
    div.className = 'habit-item';
    div.innerHTML = `<div class="habit-check"></div><div class="habit-name">${escHtml(h.name)}</div>`;
    div.addEventListener('click', () => completeHabit(h.id));
    list.appendChild(div);
  });
}

function completeHabit(id) {
  const key = todayKey();
  if (!completions[key]) completions[key] = [];
  if (!completions[key].includes(id)) completions[key].push(id);
  save('completions', completions);

  // animate out
  const items = document.querySelectorAll('.habit-item');
  items.forEach(item => {
    const name = item.querySelector('.habit-name').textContent;
    const h = habits.find(x => x.id === id);
    if (h && name === h.name) {
      item.style.transition = 'opacity .3s, transform .3s';
      item.style.opacity = '0';
      item.style.transform = 'translateX(20px)';
      setTimeout(() => renderMain(), 300);
    }
  });
}

// ── SETTINGS ──
let selectedDays = [0,1,2,3,4,5,6];

function openSettings() {
  renderDayTabs();
  renderSavedHabits();
  renderStats();
  document.getElementById('habitScreen').classList.remove('active');
  document.getElementById('settingsScreen').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsScreen').classList.remove('active');
  document.getElementById('habitScreen').classList.add('active');
  renderMain();
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (selectedDays.includes(i) ? ' selected' : '');
    btn.textContent = d;
    btn.onclick = () => {
      if (selectedDays.includes(i)) {
        if (selectedDays.length > 1) selectedDays = selectedDays.filter(x => x !== i);
      } else {
        selectedDays.push(i);
      }
      renderDayTabs();
    };
    container.appendChild(btn);
  });
}

function addHabit() {
  const input = document.getElementById('newHabitInput');
  const name = input.value.trim();
  if (!name) return;
  const id = Date.now().toString(36);
  habits.push({ id, name, days: [...selectedDays] });
  save('habits', habits);
  input.value = '';
  renderSavedHabits();
}

function renderSavedHabits() {
  const container = document.getElementById('savedHabitsList');
  if (habits.length === 0) {
    container.innerHTML = `<div style="color:#333;font-size:14px;padding:16px 0;">No habits yet.</div>`;
    return;
  }
  container.innerHTML = '';
  habits.forEach(h => {
    const row = document.createElement('div');
    row.className = 'saved-habit-row';
    const dayStr = h.days.sort((a,b)=>a-b).map(d=>DAYS[d]).join(', ');
    row.innerHTML = `
      <div>
        <div class="saved-habit-name">${escHtml(h.name)}</div>
        <div style="font-size:11px;color:#333;margin-top:3px;">${dayStr}</div>
      </div>
      <button class="btn-delete" onclick="deleteHabit('${h.id}')">✕</button>`;
    container.appendChild(row);
  });
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  save('habits', habits);
  renderSavedHabits();
  renderStats();
}

function renderStats() {
  const total = Object.values(completions).reduce((s, arr) => s + arr.length, 0);
  const today = (completions[todayKey()] || []).length;
  const days = Object.keys(completions).length;

  // streak: count consecutive days ending today with at least 1 completion
  let streak = 0;
  const d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (completions[k] && completions[k].length > 0) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  const grid = document.getElementById('statsGrid');
  grid.innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total Done</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Day Streak</div></div>
    <div class="stat-card"><div class="stat-val">${today}</div><div class="stat-lbl">Today</div></div>
    <div class="stat-card"><div class="stat-val">${days}</div><div class="stat-lbl">Active Days</div></div>
  `;

  // last 30 days mini heatmap
  const bar = document.getElementById('streakBar');
  bar.innerHTML = '';
  for (let i = 29; i >= 0; i--) {
    const dd = new Date(); dd.setDate(dd.getDate() - i);
    const k = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    const sq = document.createElement('div');
    sq.className = 'streak-day' + ((completions[k] || []).length > 0 ? ' done' : '');
    bar.appendChild(sq);
  }
}

// ── EXPORT ──
function exportCSV() {
  const rows = [['Date','Day','Habit','Completed']];
  const allDates = Object.keys(completions).sort();
  allDates.forEach(dateKey => {
    const ids = completions[dateKey];
    const d = new Date(dateKey + 'T12:00:00');
    const dayName = DAYSFULL[d.getDay()];
    ids.forEach(id => {
      const h = habits.find(x => x.id === id);
      rows.push([dateKey, dayName, h ? h.name : 'deleted', '1']);
    });
  });
  // also add all habits defined for each date as 0 if not done
  // (optional detail — keep simple for now)

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `habits-${todayKey()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearData() {
  if (!confirm('Delete all habit data? This cannot be undone.')) return;
  completions = {};
  save('completions', completions);
  renderStats();
  renderMain();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── LONG PRESS TO OPEN SETTINGS ──
let pressTimer;
document.getElementById('habitScreen').addEventListener('touchstart', () => {
  pressTimer = setTimeout(openSettings, 600);
}, { passive: true });
document.getElementById('habitScreen').addEventListener('touchend', () => clearTimeout(pressTimer));
document.getElementById('habitScreen').addEventListener('touchmove', () => clearTimeout(pressTimer));

// also keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 's' || e.key === 'S') openSettings();
});

// new habit on Enter
document.getElementById('newHabitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

// ── INIT ──
renderMain();
</script>
</body>
</html>
